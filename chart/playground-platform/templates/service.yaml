---
# ── UI 서버 NodePort Service (외부 노출) ──────────────────────────────────────
# 사용자가 브라우저로 접속하는 Nginx UI 서버를 노드 포트로 외부에 노출한다.
# Ingress가 활성화된 경우 이 서비스의 type을 ClusterIP로 변경하는 것이 권장된다.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}       # 서비스 이름 = Helm 릴리스 이름 (예: playground-platform)
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-ui   # UI 서버 Deployment 파드를 대상으로 선택
  ports:
    - port: {{ .Values.service.port }}    # 서비스 포트 (기본값: 80)
      targetPort: 80                      # Nginx 컨테이너 포트
      {{- if eq .Values.service.type "NodePort" }}
      # nodePort: 고정 값을 사용하면 클러스터 내에서 충돌이 발생할 수 있다.
      # 여러 노드에서 동일한 포트(30800)로 접속 가능하다는 장점이 있다.
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
      name: http
  type: {{ .Values.service.type }}  # 기본값: NodePort (values.yaml에서 변경 가능)

---
# ── API 서버 ClusterIP Service (내부 전용) ──────────────────────────────────
# FastAPI 백엔드를 클러스터 내부에서만 접근 가능한 서비스로 노출한다.
# Nginx UI 서버에서 이 서비스로 API 요청을 프록시한다.
# 외부에서 직접 접근 불가 → 인증되지 않은 외부 API 접근 차단
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api   # Nginx의 API_HOST 환경변수에서 참조하는 서비스명
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-api  # API 서버 Deployment 파드를 대상으로 선택
  ports:
    - port: 8000          # FastAPI 서버 포트
      targetPort: 8000
      name: http
  type: ClusterIP          # 클러스터 내부에서만 접근 가능 (외부 노출 없음)
