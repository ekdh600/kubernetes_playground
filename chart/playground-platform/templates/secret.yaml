---
# ── 플랫폼 설정 Secret ────────────────────────────────────────────────────────
# 관리자 자격증명과 기본 설정을 K8s Secret으로 저장한다.
# API 서버 Deployment에서 envFrom.secretRef로 이 Secret의 모든 키를 환경변수로 주입한다.
#
# [보안 주의]
# - stringData를 사용하므로 Helm이 base64 인코딩을 자동 처리한다.
# - adminPasswordHash는 helm-deploy.sh가 동적으로 생성한 bcrypt 해시여야 한다.
# - 이 Secret을 kubectl get secret -o yaml로 조회하면 base64 값이 노출되므로
#   RBAC으로 Secret 조회 권한을 최소화해야 한다.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  # 관리자 로그인 아이디
  ADMIN_USER: {{ .Values.adminUser | quote }}

  # 관리자 비밀번호 bcrypt 해시 (평문 비밀번호가 아닌 해시만 저장)
  # 생성: python3 -c "import bcrypt; print(bcrypt.hashpw(b'password', bcrypt.gensalt()).decode())"
  ADMIN_PASSWORD_HASH: {{ .Values.adminPasswordHash | quote }}

  # 플레이그라운드 파드가 배포될 네임스페이스 (중복 저장이지만 API 서버 env 주입용)
  NAMESPACE: {{ .Values.playgroundNamespace | quote }}
