{{- if .Values.serviceAccount.create -}}
---
# в”Җв”Җ н”Ңлһ«нҸј ClusterRoleBinding в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# playground-platform ServiceAccountм—җ мң„м—җм„ң м •мқҳн•ң ClusterRoleмқ„ л°”мқёл”©н•ңлӢӨ.
# мқҙ л°”мқёл”©мңјлЎң API м„ңлІ„ нҢҢл“ңк°Җ н”Ңл Ҳмқҙк·ёлқјмҡҙл“ң кҙҖлҰ¬м—җ н•„мҡ”н•ң K8s API к¶Ңн•ңмқ„ к°Җм§„лӢӨ.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-role  # к°ҷмқҖ Helm лҰҙлҰ¬мҠӨмқҳ ClusterRoleмқ„ м°ёмЎ°
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}  # playground-platform SA
    namespace: {{ .Release.Namespace }}       # playground-system л„Өмһ„мҠӨнҺҳмқҙмҠӨмқҳ SA
{{- end }}
